name: stress_pilot
description: "Load testing software"
publish_to: 'none'

version: 1.0.6

linter:
  rules:
    - always_use_package_imports

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # State management
  get_it:
  injectable:
  provider:

  # UI components
  fl_chart: ^1.1.1
  flutter_animate: ^4.5.2
  flutter_code_editor: ^0.3.5
  google_fonts:
  graphview: ^1.5.1
  lucide_icons: ^0.257.0
  shadcn_ui: ^0.54.0
  bitsdojo_window: ^0.1.6
  vector_math: ^2.2.0

  # Markdown / code highlighting
  flutter_highlight: ^0.7.0
  flutter_markdown_plus: ^1.0.7
  highlight: ^0.7.0
  markdown: ^7.2.2

  # Networking
  cookie_jar:
  dio:
  dio_cookie_manager:
  http_parser: ^4.1.2
  stomp_dart_client: ^3.0.1
  web_socket_channel:

  # File handling
  file_picker:
  path:
  path_provider:

  # Storage
  shared_preferences:

  # Process management
  ffi: ^2.1.0
  process_run: ^1.1.1

  # Package info
  package_info_plus: ^9.0.1

  # Window / tray / notifications
  local_notifier: ^0.1.6
  tray_manager: ^0.5.2
  window_manager: ^0.5.1

  # WebView / browser
  flutter_inappwebview: ^6.1.5
  url_launcher: ^6.3.0

  # Utilities
  intl: ^0.20.2
  uuid:

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.8
  injectable_generator: ^3.0.2

  # Build / packaging
  flutter_launcher_icons: ^0.14.4
  inno_bundle: ^0.11.2

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/core/
    - assets/fonts/
    - assets/themes/

  fonts:
    - family: JetBrains Mono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700

flutter_launcher_icons:
  image_path: "assets/images/logo.png"

  windows:
    generate: true
    icon_size: 256

  linux:
    generate: true

inno_bundle:
  id: 4399bf90-3627-11f1-9054-af078c8f3ecb
  publisher: "Zeann3th"